name: Release

# 免 Apple 开发者账号的发布流水线:ad-hoc 签名,产出 x86_64(Intel)与 arm64(Apple Silicon)
# 各一份 .zip 和 .dmg,挂到 GitHub Release。用户下载后需一次性放行 Gatekeeper(见 RELEASE_BODY.md)。
# 想要"下载即开、无弹窗"需付费 Developer ID 签名 + 公证,见 docs/BUILD.md 的升级路径。

on:
  push:
    tags: ['v*']               # 打 tag vX.Y.Z 触发正式发布
  workflow_dispatch:           # 也可手动触发
    inputs:
      version:
        description: '要发布的版本 tag(如 v1.2.3)。留空=只构建并上传产物、不创建 Release(试跑)。'
        required: false
        type: string

# 默认最小权限;仅 release job 提权 contents: write。
permissions:
  contents: read

jobs:
  build:
    name: Build & package (${{ matrix.arch }})
    # arm64 runner,单机即可交叉编译出 x86_64。macos-latest 正处于 15→26 迁移期会飘,先钉 macos-15;
    # 稳定后可换 macos-26。别用 macos-14(2026-07 起弃用)/ macos-13(已下线)。
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build, ad-hoc sign, package (zip + dmg)
        env:
          ARCH: ${{ matrix.arch }}
          REF_NAME: ${{ inputs.version || github.ref_name }}
        run: scripts/ci-package.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}     # 唯一名:upload-artifact v4 禁止同名上传
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # 仅 tag 触发、或手动指定了 version 时才发版;裸 workflow_dispatch 只试跑构建,不建 Release。
    # 按事件名显式判定,不依赖 push 下 inputs.version 为 null 的隐式语义。
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4          # 取 RELEASE_BODY.md(安装说明)

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true             # 两个矩阵腿的产物合并进 dist/(文件名带 arch,不冲突)

      - name: List assets
        run: ls -la dist

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: BusyElf ${{ inputs.version || github.ref_name }}
          files: dist/*
          body_path: .github/RELEASE_BODY.md  # 安装说明;与 generate_release_notes 的自动更新日志一并放进正文
          generate_release_notes: true
