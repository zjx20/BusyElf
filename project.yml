name: BusyElf
options:
  bundleIdPrefix: elf
  deploymentTarget: { macOS: "14.0" }
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: elf.busyelf
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: YES          # 公证必需
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM} # CI 从环境注入(本地可留空跑 Debug 不签名)
targets:
  BusyElf:
    type: application
    platform: macOS
    sources:
      - Sources/BusyElf
      - path: Resources               # XcodeGen 按扩展名分流:AppIcon.icns 自动进 Resources 构建阶段
        excludes: ["README.md"]        # README 是开发文档,不打进 .app/Contents/Resources
    # XcodeGen 直接由这些属性生成 Info.plist,无需单独 Info.plist 文件
    info:
      path: BusyElf-Info.plist
      properties:
        LSUIElement: true                 # 菜单栏 app,无 Dock 图标
        CFBundleName: BusyElf
        CFBundleIconFile: AppIcon         # Resources/AppIcon.icns(源:design/AppIcon.svg,见 scripts/make-icon.sh)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
    entitlements:
      path: BusyElf.entitlements
      properties:
        com.apple.security.app-sandbox: false   # 非沙盒, Developer ID 外分发
  BusyElfTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: BusyElf                          # 宿主 app;@testable import 内部类型
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: elf.busyelf.tests
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"                  # 本地跑测试不签名
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
